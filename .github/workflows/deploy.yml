name: Deploy Blog

on:
  push:
    branches: [main]
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Prevent overlapping deploys; let a running one finish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release

      - name: System dependencies
        run: sudo apt-get update && sudo apt-get install -y libfreetype6-dev libpng-dev libjpeg-dev libtiff5-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev
       
      - name: Install R packages
        run: |
          Rscript -e "
            options(repos = c(
              yihui = 'https://yihui.r-universe.dev',
              CRAN  = 'https://cloud.r-project.org'
            ))
            pkgs <- c('litedown','lt','gglite','xfun','csodata','eurostat',
                      'dplyr','tidyr','stringr','ggplot2','ggrepel','ggtext')
            install.packages(pkgs[!sapply(pkgs, requireNamespace, quietly = TRUE)])
          "

      - name: Build site
        run: Rscript build.R

      - name: Stage (excluding future-dated posts)
        run: |
          TODAY=$(date -u +%F)
          EXCLUDES=""
          for d in posts/*/; do
            name=$(basename "$d")
            postdate=$(echo "$name" | grep -oE '^[0-9]{4}-[0-9]{2}-[0-9]{2}' || true)
            if [ -n "$postdate" ] && [ "$postdate" \> "$TODAY" ]; then
              echo "Holding back: $name"
              EXCLUDES="$EXCLUDES --exclude=posts/$name/"
            fi
          done
          mkdir -p _site
          rsync -av \
            --exclude='.git/' --exclude='.github/' --exclude='.claude/' \
            --exclude='*.Rmd' --exclude='*.R' --exclude='_litedown.yml' \
            --exclude='*.Rproj' --exclude='_site/' \
            $EXCLUDES . _site/
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4